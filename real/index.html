<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Map Camera</title>
<style>
  body {font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:0;}
  h2 {color:#333; padding:15px; margin:0; text-align: center;}
  #container {max-width:520px; margin:auto; padding:10px; box-sizing: border-box;}
  video, canvas {max-width:100%; width:100%; border-radius:8px; background:#000;}
  #controls {text-align:center; margin:15px 0;}
  #controls button {
    width: 100%;
    padding: 14px 20px; font-size: 16px; font-weight:bold;
    border:none; border-radius:8px; color:#fff; cursor:pointer; background:#9c27b0;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  #controls button:hover { background:#8e24aa; }
  #details {background:#fff; padding:12px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.15); margin-top: 10px;}
  #details p {margin:6px 0; font-size:14px; color: #444; line-height: 1.4;}
  
  /* Loading bar */
  #loadingBar {
    width:100%; background:#ddd; border-radius:6px; overflow:hidden;
    margin:10px 0; height:12px; display:none;
  }
  #loadingBar div {
    width:0%; height:100%; background:#1976d2; animation: loadingAnim 2s infinite;
  }
  @keyframes loadingAnim {
    0% {width:0%;}
    50% {width:80%;}
    100% {width:0%;}
  }
</style>
</head>
<body>

<h2>📷 GPS Map Camera</h2>
<div id="container">
  <video id="camera" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <div id="loadingBar"><div></div></div>

  <div id="details">
    <p><b>📍 Address:</b> <span id="addressInfo">Fetching...</span></p>
    <p><b>Lat/Lon:</b> <span id="coords">--</span></p>
    <p><b>Weather:</b> <span id="weatherInfo">--</span></p>
    <p><b>Date/Time:</b> <span id="timeInfo">--</span></p>
  </div>

  <div id="controls">
    <button onclick="captureAndDownload()">📸 Capture & Download</button>
  </div>
</div>

<script>
let video = document.getElementById('camera');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let lat="", lon="", address="Fetching...", weather="--", formattedDateTime="";
let loadingBar = document.getElementById('loadingBar');

// গিটহাবের স্ট্যাটিক ম্যাপ অবজেক্ট তৈরি
let staticMap = new Image();
staticMap.crossOrigin = "anonymous"; 
staticMap.src = "https://raw.githubusercontent.com/appcreator05/gps-image/refs/heads/main/unnamed.png";

// লাইভ আপডেট হওয়ার জন্য কারেন্ট ডেট-টাইম জেনারেটর
function getFormattedDateTime() {
    const now = new Date();
    const day = now.getDate();
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const monthName = months[now.getMonth()];
    const year = now.getFullYear();

    let suffix = "th";
    if (day === 1 || day === 21 || day === 31) suffix = "st";
    else if (day === 2 || day === 22) suffix = "nd";
    else if (day === 3 || day === 23) suffix = "rd";

    let hours = now.getHours();
    let minutes = now.getMinutes();
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12; 
    minutes = minutes < 10 ? '0' + minutes : minutes; 

    return `Date/Time: ${day}${suffix} ${monthName} ${year}, ${hours}:${minutes} ${ampm}`;
}

// Start camera immediately
async function startCamera(){
  try{
    let stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    video.srcObject = stream;
    getLocation();
  }catch(e){alert("Camera blocked:"+e);}
}

function getLocation(){
  if(navigator.geolocation){
    loadingBar.style.display="block"; 
    navigator.geolocation.watchPosition(async pos=>{
      lat = pos.coords.latitude.toFixed(5);
      lon = pos.coords.longitude.toFixed(5);

      document.getElementById('coords').innerText = `Lat: ${lat}  Lon: ${lon}`;
      
      // লাইভ টাইম স্ক্রিনে আপডেট
      formattedDateTime = getFormattedDateTime();
      document.getElementById('timeInfo').innerText = formattedDateTime.replace("Date/Time: ", "");

      try{
        let r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        let d = await r.json(); 
        address = d.display_name || "Not Found";
      }catch{address = "Not Found";}
      document.getElementById('addressInfo').innerText = address;

      try{
        let r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
        let d = await r.json(); 
        weather = "Weather: " + d.current_weather.temperature+"°C, Wind "+d.current_weather.windspeed+"km/h";
      }catch{weather = "N/A";}
      document.getElementById('weatherInfo').innerText = weather.replace("Weather: ", "");

      loadingBar.style.display="none";
    }, err => {
      loadingBar.style.display="none";
      console.error(err);
    }, {enableHighAccuracy: true});
  }
}

// ক্যানভাস রাউন্ডেড রেক্ট ফাংশন
function drawRoundedRect(context, x, y, width, height, radius) {
    context.beginPath();
    context.moveTo(x + radius, y);
    context.lineTo(x + width - radius, y);
    context.quadraticCurveTo(x + width, y, x + width, y + radius);
    context.lineTo(x + width, y + height - radius);
    context.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    context.lineTo(x + radius, y + height);
    context.quadraticCurveTo(x, y + height, x, y + height - radius);
    context.lineTo(x, y + radius);
    context.quadraticCurveTo(x, y, x + radius, y);
    context.closePath();
}

// টেক্সট র‍্যাপ লজিক
function drawWrappedText(context, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    let currentY = y;

    for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' ';
        let metrics = context.measureText(testLine);
        let testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0) {
            context.fillText(line, x, currentY);
            line = words[n] + ' ';
            currentY += lineHeight;
        } else {
            line = testLine;
        }
    }
    context.fillText(line, x, currentY);
    return currentY;
}

function captureAndDownload(){
  if(video.videoWidth === 0) {
      alert("Camera data not ready yet!");
      return;
  }

  // ক্যামেরার অরিজিনাল ক্যাপচার সাইজ সেট করা
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // ডাইনামিক স্কেলিং ফ্যাক্টর (ক্যামেরা মেগাপিক্সেল অনুযায়ী সাইজ ঠিক রাখার জন্য)
  const scaleFactor = Math.max(canvas.width / 480, 0.6);

  // 👉 Watermark (Top Right)
  ctx.fillStyle = "rgba(255,255,255,0.8)";
  ctx.font = `normal ${Math.round(18 * scaleFactor)}px Arial`;
  ctx.textAlign = "right";
  ctx.fillText("https://w3tools05.blogspot.com", canvas.width - (15 * scaleFactor), 30 * scaleFactor);

  // ব্ল্যাক ট্রান্সলুসেন্ট ব্যাকগ্রাউন্ড বক্স (Bottom Overlay)
  let overlayHeight = 160 * scaleFactor;
  ctx.fillStyle = "rgba(0,0,0,0.65)";
  ctx.fillRect(0, canvas.height - overlayHeight, canvas.width, overlayHeight);

  // --- বাম পাশে গিটহাব ম্যাপ ড্র করার লজিক ---
  const mapSize = 130 * scaleFactor;
  const mapX = 15 * scaleFactor;
  const mapY = canvas.height - overlayHeight + (overlayHeight - mapSize) / 2;

  ctx.save();
  drawRoundedRect(ctx, mapX, mapY, mapSize, mapSize, 15 * scaleFactor);
  ctx.clip(); 
  try {
      ctx.drawImage(staticMap, mapX, mapY, mapSize, mapSize);
  } catch (e) {
      console.error("Static map overlay failed:", e);
  }
  ctx.restore();

  // টেক্সট সেটিংস
  const fontSize = Math.round(19 * scaleFactor);
  ctx.font = `normal ${fontSize}px Arial, sans-serif`;
  ctx.fillStyle = "#fff"; 
  ctx.textAlign = "left";

  const fullAddress = "📍 Address: " + address;
  const latLonStr = `Lat: ${lat}  Lon: ${lon}`;
  const weatherStr = weather.startsWith("Weather:") ? weather : "Weather: " + weather;
  const currentDateTimeStr = getFormattedDateTime(); // ক্যাপচারের নিখুঁত সময়

  const textPaddingLeft = mapX + mapSize + (15 * scaleFactor);
  const maxWidth = canvas.width - textPaddingLeft - (15 * scaleFactor);
  const lineSpacing = 22 * scaleFactor;
  
  let startY = canvas.height - overlayHeight + (30 * scaleFactor);

  // ১. ঠিকানার টেক্সট ড্র করা (র‍্যাপ সহ)
  let nextY = drawWrappedText(ctx, fullAddress, textPaddingLeft, startY, maxWidth, lineSpacing);
  
  // ২. বাকি ডিটেইলস নিচে নিখুঁত গ্যাপে প্রিন্ট করা
  ctx.fillText(latLonStr, textPaddingLeft, nextY + lineSpacing);
  ctx.fillText(weatherStr, textPaddingLeft, nextY + (lineSpacing * 2));
  ctx.fillText(currentDateTimeStr, textPaddingLeft, nextY + (lineSpacing * 3));

  // অটো ব্লগ ডাউনলোড জেনারেটর (মোবাইল অ্যাপ ফ্রেন্ডলি)
  try {
      canvas.toBlob(function(blob) {
          if (!blob) return;
          const blobUrl = URL.createObjectURL(blob);
          let link = document.createElement('a');
          link.download = "gps_camera_" + Date.now() + ".jpg";
          link.href = blobUrl;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(blobUrl);
      }, "image/jpeg", 0.95);
  } catch(e) {
      // স্যান্ডবক্স ব্লক ব্যাকআপ
      let link = document.createElement('a');
      link.download = "gps_camera_capture.jpg";
      link.href = canvas.toDataURL("image/jpeg", 0.95);
      link.click();
  }
}

// ক্যামেরা রান করা হলো
startCamera();
</script>
<script>
// 1. Right Click bondho
document.addEventListener('contextmenu', event => event.preventDefault());

// 2. Advanced Security & Alt-Menu Block
function blockSecurity(e) {
    // Alt key block (System Menu block korar chesta)
    if (e.altKey || e.keyCode == 18) {
        e.preventDefault();
        return false;
    }

    // F12, Ctrl+U, Ctrl+Shift+I, Ctrl+S, Ctrl+C block
    if (e.keyCode == 123 || 
        (e.ctrlKey && e.keyCode == 85) || 
        (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || 
        (e.ctrlKey && e.keyCode == 83) || 
        (e.ctrlKey && e.keyCode == 67)) {
        e.preventDefault();
        return false;
    }
}

// Keydown ebong Keyup — duto event-ei block kora hochhe jate menu na ashe
document.addEventListener('keydown', blockSecurity);
document.addEventListener('keyup', blockSecurity);

// 3. Text Selection block
document.onselectstart = function() { return false; };
</script>
</body>
</html>
